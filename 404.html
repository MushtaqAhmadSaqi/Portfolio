<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Mushtaq Ahmad Saqi</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Custom 404 styles to ensure a clean look without the full shell */
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="section">
    <div class="container">
      <div class="vision-card card" style="max-width: 42rem; margin: 0 auto; text-align: center;">
        <p class="eyebrow">404</p>
        <h1>Page not found</h1>
        <p class="section-intro">
          The page you’re looking for doesn’t exist or may have been moved.
        </p>
        <div class="hero-actions" style="justify-content:center; margin-top: 2rem;">
          <a class="button button-primary" href="/">Go Home</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
